<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WSC | Shipping Policy Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- PREMIUM VIBRANT THEME VARIABLES --- */
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            
            --vibrant-gradient: linear-gradient(135deg, #2563eb 0%, #8b5cf6 50%, #ec4899 100%);
            --vibrant-moving: linear-gradient(270deg, #2563eb, #8b5cf6, #ec4899, #2563eb);
            --vibrant-glow: 0 10px 25px rgba(139, 92, 246, 0.35);
            
            --surface: #ffffff; 
            --bg-main: #f1f5f9;
            --text-main: #0f172a; 
            --text-sub: #475569; 
            --doc-red: #ef4444; 
            
            --border-glass: rgba(255, 255, 255, 0.9); 
            --card-bg: rgba(255, 255, 255, 0.95);
            
            --input-bg: #f8fafc; 
            --input-border: #cbd5e1;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.04);
            --shadow-float: 0 20px 40px rgba(139, 92, 246, 0.12);
        }

        /* --- STUNNING DARK MODE --- */
        body.dark-mode {
            --primary: #3b82f6; 
            --bg-main: #020617; 
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            
            --border-glass: rgba(255, 255, 255, 0.05); 
            --card-bg: rgba(30, 41, 59, 0.85);
            
            --input-bg: #0f172a; 
            --input-border: #334155;
            
            --shadow-soft: 0 8px 30px rgba(0, 0, 0, 0.4); 
            --shadow-float: 0 20px 50px rgba(139, 92, 246, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            padding: 20px; min-height: 100vh; transition: background-color 0.5s ease;
        }

        /* Ambient Glowing Orbs with Tech Grid */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 30%, rgba(37, 99, 235, 0.15), transparent 40%), 
                radial-gradient(circle at 90% 20%, rgba(139, 92, 246, 0.15), transparent 40%), 
                radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.1), transparent 50%),
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            animation: pulseBg 20s infinite alternate ease-in-out;
        }

        body.dark-mode .ambient-bg { 
            background-image: 
                radial-gradient(circle at 10% 30%, rgba(37, 99, 235, 0.08), transparent 40%), 
                radial-gradient(circle at 90% 20%, rgba(139, 92, 246, 0.08), transparent 40%), 
                radial-gradient(circle at 50% 80%, rgba(236, 72, 153, 0.05), transparent 50%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        }

        @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }

        /* --- STANDALONE CONTAINER --- */
        .standalone-wrapper {
            width: 100%; max-width: 950px; z-index: 1; display: flex; flex-direction: column; gap: 24px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        .top-header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); 
            padding: 20px 30px; border-radius: 20px; box-shadow: var(--shadow-soft);
        }
        .top-header h2 { font-size: 22px; font-weight: 800; background: var(--vibrant-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; margin: 0;}
        .icon-btn { background: var(--surface); border: 1px solid var(--border-glass); font-size: 18px; cursor: pointer; width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; color: var(--text-main); box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
        .icon-btn:hover { transform: translateY(-3px) scale(1.05); border-color: var(--primary); color: var(--primary); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);}
        body.dark-mode .icon-btn { background: #0f172a; }

        /* --- GENERATOR CARD --- */
        .generator-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 28px; padding: 40px; box-shadow: var(--shadow-float); transition: all 0.4s ease;}
        .generator-card:hover { transform: translateY(-4px); border-color: rgba(139, 92, 246, 0.3); }
        
        .card-header-badge { display: flex; align-items: center; gap: 14px; margin-bottom: 12px;}
        .badge-icon { width: 40px; height: 40px; background: var(--vibrant-gradient); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; box-shadow: var(--vibrant-glow);}
        
        .generator-card h3 { font-size: 22px; font-weight: 800; color: var(--text-main); letter-spacing: -0.3px;}
        .generator-card p { font-size: 15px; color: var(--text-sub); margin-bottom: 28px; line-height: 1.6;}

        .input-grid-4 { display: grid; grid-template-columns: repeat(1, 1fr); gap: 16px; margin-bottom: 24px; }
        @media (min-width: 600px) { .input-grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 900px) { .input-grid-4 { grid-template-columns: repeat(4, 1fr); } }
        
        .input-field-gen { padding: 16px 20px; font-size: 14px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--input-border); border-radius: 14px; width: 100%; outline: none; transition: all 0.3s ease; font-family: inherit;}
        .input-field-gen:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2); background: var(--surface); transform: translateY(-2px);}
        
        .btn-group { display: flex; gap: 16px; margin-bottom: 24px; }
        
        .generate-btn { flex: 1; background: var(--vibrant-moving); background-size: 300% 300%; color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; transition: all 0.3s ease; font-family: inherit; margin: 0; box-shadow: var(--vibrant-glow);}
        .generate-btn:hover { animation: flowProgress 3s ease infinite; transform: translateY(-2px); filter: brightness(1.1);}
        @keyframes flowProgress { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .reset-btn { width: 56px; flex-shrink: 0; background: var(--surface); color: var(--text-sub); border: 1px solid var(--input-border); border-radius: 14px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .reset-btn:hover { background: rgba(239, 68, 68, 0.1); color: var(--doc-red); border-color: rgba(239, 68, 68, 0.3); transform: translateY(-2px);}
        .reset-btn svg { transition: transform 0.5s ease; }
        .reset-btn:hover svg { transform: rotate(180deg); }

        .output-box { width: 100%; height: 450px; padding: 24px; border-radius: 16px; border: 1px solid var(--input-border); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; color: var(--text-main); background: var(--input-bg); overflow-y: auto; outline: none; transition: all 0.3s ease; resize: vertical;}
        .output-box:focus { border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);}
        
        .output-box[contenteditable]:empty::before { content: attr(placeholder); color: var(--text-sub); pointer-events: none; display: block; }
        
        .text-stats { display: flex; align-items: center; gap: 15px; font-size: 13px; color: var(--text-sub); margin-top: 14px; font-weight: 600; background: var(--surface); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border-glass); width: fit-content; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}

        .btn-copy-themed { position: absolute; top: 20px; right: 20px; background: var(--surface); color: var(--text-main); border: 1px solid var(--input-border); padding: 10px 20px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); z-index: 10;}
        .btn-copy-themed:hover { background: var(--vibrant-gradient); color: white; border-color: transparent; box-shadow: var(--vibrant-glow); transform: translateY(-2px);}
        body.dark-mode .btn-copy-themed { background: var(--input-bg); color: #fff; border-color: #334155; }

    </style>
</head>
<body>

    <div class="ambient-bg"></div>

    <div class="standalone-wrapper">
        <header class="top-header">
            <h2><span style="font-size: 26px;">❖</span> WSC Policy Tools</h2>
            <button class="icon-btn" onclick="toggleTheme()" title="Toggle Day/Night Mode" id="themeBtn">🌙</button>
        </header>

        <div class="generator-card">
            <div class="card-header-badge">
                <div class="badge-icon">📦</div>
                <h3>General Terms & Policy Generator</h3>
            </div>
            <p>Fill in the client details below and select your format to instantly generate a complete, compliant policy document.</p>
            
            <div class="input-grid-4">
                <input type="text" id="shippingBizName" class="input-field-gen" placeholder="Business Name (e.g. Acme Corp)">
                <input type="text" id="shippingContactInput" class="input-field-gen" placeholder="Contact Page Link">
                <input type="text" id="shippingEmailInput" class="input-field-gen" placeholder="Support Email">
                <input type="text" id="shippingUrlInput" class="input-field-gen" placeholder="Website URL (e.g. www.acme.com)" onblur="formatUrl(this)">
            </div>

            <div style="margin-bottom: 24px;">
                <label style="font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px;">Select Policy Format</label>
                <select id="shippingPolicyType" class="input-field-gen" style="cursor: pointer;">
                    <option value="long">Option 1: Detailed General Policy (Visual Preview)</option>
                    <option value="short">Option 2: Standard Short Policy (Raw HTML Code)</option>
                </select>
            </div>
            
            <div class="btn-group">
                <button type="button" onclick="generateShipping()" class="generate-btn">✨ Generate Policy</button>
                <button type="button" onclick="resetShipping(event)" class="reset-btn" title="Reset Fields">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
            </div>
            
            <div id="instructionBox" style="display: none; margin-bottom: 20px;"></div>

            <div style="position: relative;">
                <div id="shippingOutput" class="output-box" contenteditable="true" placeholder="Your custom policy will appear here..." oninput="updateStats('shippingOutput', 'shippingStats')"></div>
                
                <button type="button" onclick="copyText(this, 'shippingOutput')" class="btn-copy-themed">Copy Text</button>

                <div id="shippingStats" class="text-stats">📊 <b>0</b> words &nbsp;|&nbsp; ⏱️ <b>~0</b> min read</div>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            body.classList.toggle('dark-mode');
            
            const isDark = body.classList.contains('dark-mode');
            btn.innerText = isDark ? '☀️' : '🌙';
            
            try {
                localStorage.setItem('kb_dark_mode', isDark ? 'true' : 'false');
            } catch(e) {
                console.log("Local storage restricted.");
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            try {
                if (localStorage.getItem('kb_dark_mode') === 'true') {
                    document.body.classList.add('dark-mode');
                    const btn = document.getElementById('themeBtn');
                    if (btn) btn.innerText = '☀️';
                }
            } catch(e) {
                console.log("Local storage restricted.");
            }
        });

        // Automatically formats the URL to ensure it strips https:// and starts with www.
        function formatUrl(inputElement) {
            let val = inputElement.value.trim();
            if (val) {
                // Strip http://, https://, and trailing slashes
                val = val.replace(/^https?:\/\//, '').replace(/\/$/, '');
                // Add www. if it doesn't exist
                if (!val.startsWith('www.')) {
                    val = 'www.' + val;
                }
                inputElement.value = val;
            }
        }

        function copyText(buttonElement, containerId) {
            const container = document.getElementById(containerId);
            if (!container.innerText.trim()) return; 

            // If it is Option 2 (code), we copy the literal text. If Option 1 (visual), we copy visual text.
            const range = document.createRange();
            range.selectNodeContents(container);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                const originalText = buttonElement.innerText;
                buttonElement.innerText = 'Copied!';
                buttonElement.style.background = 'var(--primary)';
                buttonElement.style.color = '#fff';
                setTimeout(() => { 
                    buttonElement.innerText = originalText; 
                    buttonElement.style.background = '';
                    buttonElement.style.color = '';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy text: ', err);
            }
            selection.removeAllRanges();
        }

        function updateStats(containerId, statsId) {
            const text = document.getElementById(containerId).innerText;
            const words = text.trim().split(/\s+/).filter(word => word.length > 0).length;
            const readTime = Math.ceil(words / 200) || 1;
            
            let html = `📊 <b>${words}</b> words &nbsp;|&nbsp; ⏱️ <b>~${readTime}</b> min read`;
            if(words === 0) { html = `📊 <b>0</b> words &nbsp;|&nbsp; ⏱️ <b>~0</b> min read`; }
            
            document.getElementById(statsId).innerHTML = html;
        }

        function visualReset(btn) {
            btn.style.transform = 'scale(0.9)';
            btn.style.backgroundColor = 'var(--doc-red)';
            btn.style.color = 'white';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.backgroundColor = '';
                btn.style.color = '';
            }, 200);
        }

        function resetShipping(e) {
            visualReset(e.currentTarget);
            document.getElementById('shippingBizName').value = '';
            document.getElementById('shippingUrlInput').value = '';
            document.getElementById('shippingContactInput').value = '';
            document.getElementById('shippingEmailInput').value = '';
            document.getElementById('shippingPolicyType').value = 'long';
            document.getElementById('shippingOutput').innerHTML = ''; 
            document.getElementById('instructionBox').style.display = 'none';
            updateStats('shippingOutput', 'shippingStats');
        }

        function generateShipping() {
            const b = document.getElementById('shippingBizName').value || '[BUSINESS NAME]';
            const contact = document.getElementById('shippingContactInput').value || '[CONTACT US PAGE LINK]';
            const email = document.getElementById('shippingEmailInput').value || '[BUSINESS EMAIL ADDRESS]';
            const type = document.getElementById('shippingPolicyType').value;
            const outputBox = document.getElementById('shippingOutput');

            // Format URL cleanly for generation
            let urlInput = document.getElementById('shippingUrlInput').value || '[WEBSITE URL LINK]';
            if (urlInput !== '[WEBSITE URL LINK]') {
                urlInput = urlInput.replace(/^https?:\/\//, '').replace(/\/$/, '');
                if (!urlInput.startsWith('www.')) { urlInput = 'www.' + urlInput; }
            }
            const url = urlInput;

            // --- BULLETPROOF HTML FORMATTING ---
            const p = `<div style="font-weight: 400; font-size: 15px; line-height: 1.6; margin: 0; padding: 0; display: block; color: inherit;">`;
            const pEnd = `</div>`;
            const space = `<div style="font-size: 15px; line-height: 1.5; margin: 0; padding: 0;">&nbsp;</div>`;
            
            // Hardcoded native bold tags <b> with inline styles
            const h1 = `<div style="font-size: 28px; margin: 0; padding: 0; display: block; color: inherit;"><b style="font-weight: bold;">`;
            const h1End = `</b></div>`;
            const h2 = `<div style="font-size: 22px; margin: 0; padding: 0; display: block; color: inherit;"><b style="font-weight: bold;">`;
            const h2End = `</b></div>`;
            const h3 = `<div style="font-size: 18px; margin: 0; padding: 0; display: block; color: inherit;"><b style="font-weight: bold;">`;
            const h3End = `</b></div>`;

            // -----------------------------------------------------
            // OPTION 1: LONG HTML POLICY (Visual Output)
            // -----------------------------------------------------
            const longHtmlPolicy = `
    ${h1}General Terms & Policy${h1End}
    ${space}
    ${p}${b} reserves the right to update the rules when necessary, and the updated version will be published on ${url} with immediate effect. If you refuse to accept the policy, you are deemed to have waived the use of the services provided by ${b} immediately. All buyers are deemed to accept the rules if they are using the services provided by ${b}. ${b}'s policy shall prevail.${pEnd}
    ${space}
    ${p}For after-sales issues, buyers should file a return & refund request within 30 days of the delivery date. The period of Return & Refund request filed exceeds, ${b} reserves the right not to provide any after-sales service after that time.${pEnd}
    ${space}
    ${p}Before an order is shipped out, the buyer has the right to apply to cancel the order by contacting ${b} via <a href="${contact}" style="color: #2563eb; text-decoration: none;">Contact Us</a>.${pEnd}
    ${space}
    ${p}If ${b} cannot fulfill the buyer's order within the order processing time, under the condition but not limited to no stock or other conditions, ${b} has the right to cancel and refund the order.${pEnd}
    ${space}
    ${p}If the buyer receives goods damaged or broken and applies for a refund with compelling evidence, and the goods need to be returned, ${b} has the responsibility to offer the buyer a prepaid return label within 3 business days to return damaged/broken goods. ${b} should refund the buyer when the return shows as in transit on the logistic website with the provided prepaid return label.${pEnd}
    ${space}
    ${p}${b} shall not accept after-sale request for "non-defective remorse returns", and has the right to accept or reject the request. ${b} will abide by the policy under this condition.${pEnd}
    ${space}
    ${p}If ${b} accepts the after-sale request for the reason type of "non-defective remorse returns" and require to deduct a "restocking & repacking fee", under ${b}'s policy restriction, the "restocking & repacking fee" in total deducted shall not exceed 35% of order total price.${pEnd}
    ${space}
    ${p}${b} shall not require warranty, like whether to provide warranty or not, or the way of warranty handling with.${pEnd}
    ${space}
    ${p}${b} shall restrict with the refund time and redelivery time under the condition, included but not limited to order should refund based on the policy, agree on refund or redelivery between ${b} and buyer or others, ${b} must refund not more than 3 business days, or redelivery not more than 5 business days.${pEnd}
    ${space}
    ${p}Once the buyer submits the after-sales request, the buyer needs to provide evidence (as the clause states below) to ${b}. If the buyer cannot provide compelling evidence within the order after-sales period policy indicated, ${b} has the right to reject the return and refund request.${pEnd}
    ${space}
    ${p}Whether the evidence is compelling or not will ultimately be determined by ${b} Under Various Circumstances:${pEnd}
    ${space}
    ${h2}1. Refund Request Timing${h2End}
    ${space}
    ${p}The buyer has the right to apply for a full refund for the order that was not shipped out within the stated processing time (subject to the estimated processing time displayed on the order page).${pEnd}
    ${space}
    ${p}Return & Refund Type ${b} Rules${pEnd}
    ${space}
    ${p}For Unshipped Orders:<br>
    The Return & Refund request is made after the stated processing time. ${b} will refund the order. The Return & Refund request is made within the stated processing time.<br>
    ${b} has 3 business days to process the request after the buyer submits it. If ${b} fails to process (accept or reject) the refund request within 3 business days, ${b} will refund the order.<br>
    Please note: Although the order is still within the stated processing time, any refund request needs to be processed within the time listed above.${pEnd}
    ${space}
    ${p}For Shipped Orders:<br>
    The Return & Refund request is made after the order has shipped. ${b} has 10 business days to process the request after the buyer submits it. If ${b} fails to process (accept or reject) the refund request within 10 business days, ${b} will refund the order.${pEnd}
    ${space}
    ${h2}2. Goods Returned in Transit${h2End}
    ${space}
    ${p}If the package is sent back to ${b} during transit for any reason, and the buyer applies for a refund, ${b} should refund within 3 business days of the refund request. Under the same cases, if the buyer requests redelivery, ${b} should begin redelivery within 5 business days of the request date.${pEnd}
    ${space}
    ${h2}3. Goods Destroyed in Transit${h2End}
    ${space}
    ${p}If the package/goods are destroyed in transit, and buyer has proof from the logistics website such as but not limited to a screenshot from the logistics website that the order was destroyed, ${b} should refund the order within 3 business days of buyer's refund request, or redelivery within 5 business days of the request. The following steps must be followed when creating this type of request.${pEnd}
    ${space}
    ${p}a. Photos or videos of the damaged item to prove damage. If the photo cannot prove the products are damaged, please upload the video.<br>
    b. Screenshot of the e-mail or dispute received including name, date and content. In other words, a customer has sent the complaint (Through PayPal Dispute or other Gateway, e-mail, etc.).<br>
    c. The products need to be returned to ${b}, if our Dispute Team asks for a return in Disputes.${pEnd}
    ${space}
    ${p}Except for the important interpretation, ${b} will make a refund, resend, or accept the return for any of the following cases:${pEnd}
    ${space}
    ${h3}3.1 Orders Delayed${h3End}
    ${space}
    ${p}Orders are lacking tracking information, in transit, pending, expired 60 days after orders departed from ${b} warehouse. Following countries and shipping methods may be different:${pEnd}
    ${space}
    ${p}a. For orders shipped to the USA, it will be counted 45 days after orders departed from ${b} warehouse.<br>
    b. For Brazil, it is after 110 days counting from the date that order departed from ${b} warehouse due to the strict customs clearance at Brazil.<br>
    c. For ${b}Packet Liquid Line to all countries, ${b} will deal with your dispute for delayed orders after 100 days counting from the date that order departed from ${b} warehouse.<br>
    d. For some special shipping methods, ${b} cannot deal with your disputes. (See the following important interpretation)${pEnd}
    ${space}
    ${p}Notes:<br>
    Sometimes, the order had arrived at the nearest post office to the buyer and make it pending because of insufficient address, package unclaimed, no such number, etc. It will be much more convenient for clients to contact the local post office or go to the post office for delivery.<br><br>
    Due to such conditions as national realities, phone numbers, and religious beliefs in Israel, packages will be normally delivered to self pick-up cabinets, which may lead to packages being long overdue. Therefore, it will be much more convenient for clients to contact the local post office or go to the post office for delivery.<br><br>
    Sometimes, local tracking numbers may show a sign for delivery, but the end customer claims that the package has not been received. In such cases, ${b} will spare no effort to verify the real situation, which could be a long process (1-2 months), but there is no guarantee of a positive result.${pEnd}
    ${space}
    ${h3}3.2 Orders not Received${h3End}
    ${space}
    ${p}${b} will not deal with the refund or resend if the tracking information shows the order is delivered.${pEnd}
    ${space}
    ${p}a. If clients do not receive the package, a non-delivery certification issued by the local post office with an official seal is necessary.<br>
    b. Tracking information alert. The tracking information shows Alert, the reasons are listed as below:<br>
    &nbsp;&nbsp;&nbsp;&nbsp;a) Incorrect/insufficient address.<br>
    &nbsp;&nbsp;&nbsp;&nbsp;b) No such number.<br>
    &nbsp;&nbsp;&nbsp;&nbsp;c) Unknown recipient.<br>

    ${space}
    ${p}If proof is valid, and buyer requests redelivery, ${b} should redelivery within 5 business days of proof approval. Please note ${b} has the right to refund orders if the redelivery products have no stocks, or buyers are able to reorder products when the products are restocked.${pEnd}
    ${space}
